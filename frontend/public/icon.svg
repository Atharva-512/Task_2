<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Background: rounded square, brand primary -->
  <rect x="0" y="0" width="512" height="512" rx="112" fill="#2563EB"/>

  <!-- Subtle depth via secondary-color base shadow disc (flat, no blur) -->
  <circle cx="256" cy="272" r="152" fill="#1E40AF"/>

  <!-- Plate: white disc -->
  <circle cx="256" cy="264" r="152" fill="#FFFFFF"/>

  <!-- Plate inner rim: thin ring in secondary color -->
  <circle cx="256" cy="264" r="118" fill="none" stroke="#1E40AF" stroke-width="8" opacity="0.16"/>

  <!-- Analytics bars, ascending, centered on the plate -->
  <g>
    <rect x="176" y="288" width="34" height="64" rx="8" fill="#1E40AF"/>
    <rect x="222" y="256" width="34" height="96" rx="8" fill="#2563EB"/>
    <rect x="268" y="216" width="34" height="136" rx="8" fill="#1E40AF"/>
    <rect x="314" y="184" width="34" height="168" rx="8" fill="#0F172A"/>
  </g>
</svg>
